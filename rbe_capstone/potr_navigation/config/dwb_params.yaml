
# Preset 1 biases toward Safety and Accuracy.
# Preset 2 biases toward Efficiency.

preset_1:  # Safe + Accurate
  controller_server:
    ros__parameters:
      FollowPath:
        max_speed_xy: 1.0

        # Safety
        BaseObstacle.scale: 0.02
        BaseObstacle.sum_scores: false

        # Accuracy
        PathDist.scale: 32.0
        PathAlign.scale: 32.0
        PathAlign.forward_point_distance: 0.325
        RotateToGoal.scale: 32.0
        RotateToGoal.slowing_factor: 5.0
        RotateToGoal.lookahead_time: 0.5

        # Efficiency
        GoalDist.scale: 20.0
        GoalAlign.scale: 20.0
        GoalAlign.forward_point_distance: 0.1

        # Planning horizon (longer = more considered paths)
        sim_time: 2.0
        vx_samples: 15
        vy_samples: 1
        vtheta_samples: 20

preset_2:  # Efficient
  controller_server:
    ros__parameters:
      FollowPath:
        # Speed ceiling
        max_speed_xy: 1.5

        # Safety
        BaseObstacle.scale: 0.01
        BaseObstacle.sum_scores: false

        # Accuracy
        PathDist.scale: 20.0
        PathAlign.scale: 20.0
        PathAlign.forward_point_distance: 0.325
        RotateToGoal.scale: 32.0
        RotateToGoal.slowing_factor: 5.0
        RotateToGoal.lookahead_time: 0.5

        # Efficiency
        GoalDist.scale: 32.0
        GoalAlign.scale: 32.0
        GoalAlign.forward_point_distance: 0.1

        # Planning horizon (shorter = faster but less smooth)
        sim_time: 1.0
        vx_samples: 15
        vy_samples: 1
        vtheta_samples: 20