# All positions are in map frame.
# start: where the robot spawns at the beginning of each episode
# goal:  navigation target for that episode
# map:   map to load (optional — falls back to default_map param)
#
# Points collected via ros2 topic echo /clicked_point in RViz (map: dense_clutter).
# Episodes mix these points as both starts and goals so the agent sees diverse
# traversals rather than always launching from the same home position.

