# All positions are in map frame.
# start: where the robot spawns at the beginning of each episode
# goal:  navigation target for that episode
# map:   map to load (optional — falls back to default_map param)
#
# Points collected via ros2 topic echo /clicked_point in RViz (map: dense_clutter).
# Episodes mix these points as both starts and goals so the agent sees diverse
# traversals rather than always launching from the same home position.

episode_runner:
  ros__parameters:
    default_map: 'dense_clutter'
    map_to_odom_x: -4.0    # matches the map->odom static TF in potr_robot.launch.py
    map_to_odom_y:  0.0
    rl_mode: true
    episodes: >
      [
        {"map": "dense_clutter", "start": {"x": -5.75, "y": -6.75, "yaw": 0.0}, "goal": {"goal_id": "ep_04", "x":  4.65, "y":  3.20, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
        {"map": "dense_clutter", "start": {"x": -6.47, "y":  4.74, "yaw": 0.0}, "goal": {"goal_id": "ep_05", "x":  5.34, "y": -6.58, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
