        {"map": "dense_clutter", "start": {"x": -4.66, "y":  3.64, "yaw": 0.0}, "goal": {"goal_id": "ep_07", "x":  2.95, "y": -4.68, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
        {"map": "dense_clutter", "start": {"x": -1.92, "y": -4.63, "yaw": 0.0}, "goal": {"goal_id": "ep_08", "x":  1.06, "y":  4.63, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
