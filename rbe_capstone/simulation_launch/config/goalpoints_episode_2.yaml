        {"map": "narrow_aisles", "start": {"x":  4.96, "y": -7.82, "yaw": 0.0}, "goal": {"goal_id": "ep_04", "x": -3.52, "y":  7.03, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
        {"map": "narrow_aisles", "start": {"x":  6.80, "y":  8.67, "yaw": 0.0}, "goal": {"goal_id": "ep_05", "x":  4.96, "y": -7.82, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
