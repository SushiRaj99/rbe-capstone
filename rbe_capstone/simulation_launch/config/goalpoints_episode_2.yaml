# All positions are in map frame.
# start: where the robot spawns at the beginning of each episode
# goal:  navigation target for that episode
# map:   map to load (optional — falls back to default_map param)
#
# Points collected via ros2 topic echo /clicked_point in RViz (map: narrow_aisles).
# Episodes mix these points as both starts and goals so the agent sees diverse
# traversals rather than always launching from the same home position.

episode_runner:
  ros__parameters:
    default_map: 'narrow_aisles'
    map_to_odom_x: -4.0    # matches the map->odom static TF in potr_robot.launch.py
    map_to_odom_y:  0.0
    rl_mode: true
    episodes: >
      [
        {"map": "narrow_aisles", "start": {"x": -3.30, "y": -2.17, "yaw": 0.0}, "goal": {"goal_id": "ep_01", "x":  6.80, "y":  8.67, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
        {"map": "narrow_aisles", "start": {"x": -3.30, "y": -2.17, "yaw": 0.0}, "goal": {"goal_id": "ep_02", "x": -3.52, "y":  7.03, "yaw": 0.0, "xy_tolerance": 0.35, "yaw_tolerance": 0.5}},
